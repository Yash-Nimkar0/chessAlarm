name: chess_alarm
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  alarm: ^5.5.0
  shared_preferences: ^2.5.5
  intl: ^0.20.3
  csv: ^8.0.0
  squares: ^1.2.1
  bishop: ^1.4.4
  square_bishop: ^0.3.0
  haptic_feedback: ^0.6.4+3
  audioplayers: ^6.8.1
  fl_chart: ^1.2.0
  permission_handler: ^12.0.3
  file_picker: ^11.0.2
  dynamic_color: ^1.8.1
  share_plus: ^12.0.2
  geolocator: ^14.0.2
  http: ^1.6.0
  wakelock_plus: ^1.5.2
  url_launcher: ^6.3.2
  sensors_plus: ^7.1.0
  noise_meter: ^5.1.0
  record: ^7.1.1
  path_provider: ^2.1.6
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/marimba.mp3
    - assets/icon.png
    - assets/puzzles.csv
    - assets/audio/
